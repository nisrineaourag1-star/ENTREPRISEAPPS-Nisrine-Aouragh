# Applicatie naam
spring.application.name=Anderlecht NGO

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:anderlechtdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Mail configuratie via Mailtrap.io
# Registreer gratis op https://mailtrap.io en vervang onderstaande credentials
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=JOUW_MAILTRAP_USERNAME
spring.mail.password=JOUW_MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin e-mail (ontvanger van contactberichten)
app.admin.email=admin@anderlecht-ngo.be

# Server poort
server.port=8080
