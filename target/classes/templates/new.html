<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head th:replace="~{fragments/layout :: head('Nieuw evenement')}"></head>
<body class="flex flex-col min-h-screen bg-gray-50">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="flex-grow max-w-3xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">

    <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <!-- Formulier header -->
        <div class="bg-ngo-800 px-6 py-5">
            <h1 class="text-2xl font-bold text-white">Nieuw evenement toevoegen</h1>
            <p class="text-ngo-100 text-sm mt-1">Vul alle velden in om een evenement te registreren.</p>
        </div>

        <form th:action="@{/evenementen/nieuw}" th:object="${evenementForm}" method="post" class="p-6 space-y-5">

            <!-- Titel -->
            <div>
                <label for="titel" class="block text-sm font-semibold text-gray-700 mb-1">Titel *</label>
                <input type="text" id="titel" th:field="*{titel}" placeholder="Naam van het evenement"
                       th:classappend="${#fields.hasErrors('titel')} ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-ngo-500'"
                       class="w-full rounded-lg border px-4 py-2 text-sm focus:outline-none focus:ring-2 transition"/>
                <p th:if="${#fields.hasErrors('titel')}" th:errors="*{titel}"
                   class="mt-1 text-xs text-red-600"></p>
            </div>

            <!-- Tijdstip -->
            <div>
                <label for="tijdstip" class="block text-sm font-semibold text-gray-700 mb-1">Datum &amp; tijdstip *</label>
                <input type="datetime-local" id="tijdstip" th:field="*{tijdstip}"
                       th:classappend="${#fields.hasErrors('tijdstip')} ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-ngo-500'"
                       class="w-full rounded-lg border px-4 py-2 text-sm focus:outline-none focus:ring-2 transition"/>
                <p th:if="${#fields.hasErrors('tijdstip')}" th:errors="*{tijdstip}"
                   class="mt-1 text-xs text-red-600"></p>
            </div>

            <!-- Omschrijving -->
            <div>
                <label for="omschrijving" class="block text-sm font-semibold text-gray-700 mb-1">Omschrijving *</label>
                <textarea id="omschrijving" th:field="*{omschrijving}" rows="4" placeholder="Beschrijf het evenement..."
                          th:classappend="${#fields.hasErrors('omschrijving')} ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-ngo-500'"
                          class="w-full rounded-lg border px-4 py-2 text-sm focus:outline-none focus:ring-2 transition resize-none"></textarea>
                <p th:if="${#fields.hasErrors('omschrijving')}" th:errors="*{omschrijving}"
                   class="mt-1 text-xs text-red-600"></p>
            </div>

            <!-- Organisatie -->
            <div>
                <label for="organisatie" class="block text-sm font-semibold text-gray-700 mb-1">Organisatie *</label>
                <input type="text" id="organisatie" th:field="*{organisatie}"
                       placeholder="'Eigen beheer' of naam van de partnerorganisatie"
                       th:classappend="${#fields.hasErrors('organisatie')} ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-ngo-500'"
                       class="w-full rounded-lg border px-4 py-2 text-sm focus:outline-none focus:ring-2 transition"/>
                <p th:if="${#fields.hasErrors('organisatie')}" th:errors="*{organisatie}"
                   class="mt-1 text-xs text-red-600"></p>
            </div>

            <!-- E-mail contactpersoon -->
            <div>
                <label for="contactMail" class="block text-sm font-semibold text-gray-700 mb-1">E-mail contactpersoon *</label>
                <input type="email" id="contactMail" th:field="*{contactMail}"
                       placeholder="contactpersoon@organisatie.be"
                       th:classappend="${#fields.hasErrors('contactMail')} ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-ngo-500'"
                       class="w-full rounded-lg border px-4 py-2 text-sm focus:outline-none focus:ring-2 transition"/>
                <p th:if="${#fields.hasErrors('contactMail')}" th:errors="*{contactMail}"
                   class="mt-1 text-xs text-red-600"></p>
            </div>

            <!-- Locatie -->
            <div>
                <label for="locatieId" class="block text-sm font-semibold text-gray-700 mb-1">Locatie *</label>
                <select id="locatieId" th:field="*{locatieId}"
                        th:classappend="${#fields.hasErrors('locatieId')} ? 'border-red-400 focus:ring-red-400' : 'border-gray-300 focus:ring-ngo-500'"
                        class="w-full rounded-lg border px-4 py-2 text-sm focus:outline-none focus:ring-2 transition bg-white">
                    <option value="">-- Selecteer een locatie --</option>
                    <option th:each="loc : ${locaties}"
                            th:value="${loc.id}"
                            th:text="${loc.naam} + ' (' + ${loc.adres} + ' | max. ' + ${loc.capaciteit} + ' pers.)'">
                        Locatie
                    </option>
                </select>
                <p th:if="${#fields.hasErrors('locatieId')}" th:errors="*{locatieId}"
                   class="mt-1 text-xs text-red-600"></p>
            </div>

            <!-- Knoppen -->
            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                <a th:href="@{/}" class="text-sm text-gray-500 hover:text-gray-700 transition">
                    &larr; Annuleren
                </a>
                <button type="submit"
                        class="bg-ngo-700 hover:bg-ngo-600 text-white font-semibold px-6 py-2 rounded-lg shadow transition-colors duration-200">
                    Evenement opslaan
                </button>
            </div>

        </form>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
