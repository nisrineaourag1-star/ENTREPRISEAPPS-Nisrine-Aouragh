<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="nl">
<head th:fragment="head(paginaTitel)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${paginaTitel} + ' | Anderlecht Gemeenschapshuis'">Anderlecht NGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ngo: {
                            50:  '#fef2f4',
                            100: '#fde8ec',
                            500: '#922b3e',
                            600: '#7a2234',
                            700: '#651a29',
                            800: '#50131f',
                            900: '#3c0d17',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body>
<!-- NAVIGATIEBALK -->
<nav th:fragment="nav" class="bg-ngo-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- NGO Naam links -->
            <a th:href="@{/}" class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-ngo-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                <span class="text-white font-bold text-xl tracking-tight">Anderlecht Gemeenschapshuis</span>
            </a>

            <!-- Navigatielinks rechts -->
            <div class="flex items-center space-x-1">
                <a th:href="@{/evenementen/nieuw}"
                   class="text-ngo-100 hover:bg-ngo-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium transition-colors duration-200">
                    + Nieuw Evenement
                </a>
                <a th:href="@{/about}"
                   class="text-ngo-100 hover:bg-ngo-700 hover:text-white px-4 py-2 rounded-md text-sm font-medium transition-colors duration-200">
                    Over ons
                </a>
                <a th:href="@{/contact}"
                   class="ml-2 bg-white text-ngo-800 hover:bg-ngo-50 px-4 py-2 rounded-md text-sm font-semibold transition-colors duration-200">
                    Contact
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- FOOTER -->
<footer th:fragment="footer" class="bg-ngo-900 text-ngo-100 mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 text-center">
        <p class="text-sm">&copy; 2026 Anderlecht Gemeenschapshuis vzw. Alle rechten voorbehouden.</p>
    </div>
</footer>
</body>
</html>
